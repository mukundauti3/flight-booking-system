name: SkyBooker CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ================================================================
  # 1. Lint + Unit Tests — Backend
  # ================================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      skybooker_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Seed test database
        run: |
          mysql -h 127.0.0.1 -u root -proot skybooker_test < database/schema.sql
          mysql -h 127.0.0.1 -u root -proot skybooker_test < database/seed.sql
        env:
          MYSQL_PWD: root

      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV:     test
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/skybooker_test
          JWT_SECRET:   test_jwt_secret_min_64_chars_change_me_in_production
          PAYMENT_SERVICE_URL:     http://localhost:7000
          PAYMENT_SERVICE_API_KEY: test_key
          SMTP_HOST:               test
          SMTP_USER:               ""
          SMTP_PASS:               ""

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ================================================================
  # 2. Build — Frontend
  # ================================================================
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_RAZORPAY_KEY_ID: rzp_test_PLACEHOLDER

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ================================================================
  # 3. Build .NET Payment Service
  # ================================================================
  build-payment-service:
    name: Payment Service Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore
        working-directory: payment-service

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: payment-service

  # ================================================================
  # 4. Docker Build + Push (main branch only)
  # ================================================================
  docker-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, build-payment-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags:  ${{ secrets.DOCKER_USERNAME }}/skybooker-backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags:  ${{ secrets.DOCKER_USERNAME }}/skybooker-frontend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
